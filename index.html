<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1f6feb" />
    <title>代购记账</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <button id="open-side-menu" class="icon-btn" aria-label="打开管理菜单">☰</button>
        <h1 id="page-title">预购清单</h1>
      </header>

      <nav class="module-nav" aria-label="模块导航">
        <button class="nav-btn active" data-tab="preorders">
          <span class="nav-icon">🛍</span>
          <span class="nav-text">预购清单</span>
        </button>
        <button class="nav-btn" data-tab="fulfillments">
          <span class="nav-icon">📦</span>
          <span class="nav-text">收款发货</span>
        </button>
        <button class="nav-btn" data-tab="stats">
          <span class="nav-icon">📊</span>
          <span class="nav-text">记录统计</span>
        </button>
      </nav>

      <div id="menu-mask" class="menu-mask"></div>
      <aside id="side-menu" class="side-menu" aria-label="次要模块">
        <div class="side-menu-header">
          <strong>管理功能</strong>
          <button id="close-side-menu" class="icon-btn" aria-label="关闭管理菜单">×</button>
        </div>
        <button class="side-nav-btn" data-tab="products">商品库</button>
        <button class="side-nav-btn" data-tab="customers">客户管理</button>
        <button class="side-nav-btn" data-tab="categories">分类管理</button>
        <div class="side-menu-divider"></div>
        <button id="export-backup-btn" class="side-nav-btn">导出本地备份</button>
        <label class="side-nav-btn side-file-btn" for="import-backup-file">导入备份文件</label>
        <input id="import-backup-file" type="file" accept=".json,application/json" hidden />
        <p class="side-menu-tip">建议固定同一个线上域名访问，并定期导出备份。</p>
      </aside>

      <main class="page-content">
        <section class="tab-panel active" id="tab-preorders">
          <div class="panel-toolbar preorders-toolbar">
            <div class="segmented">
              <button class="seg-btn active" id="mode-by-category" data-mode="category">按商品分类</button>
              <button class="seg-btn" id="mode-by-customer" data-mode="customer">按买家分类</button>
            </div>
            <button id="open-preorder-modal" class="fab" aria-label="新增预购订单">
              <span class="fab-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div id="preorder-list" class="card-list empty-tip">暂无预购订单，点击右侧加号开始添加。</div>
        </section>

        <section class="tab-panel" id="tab-fulfillments">
          <div class="panel-toolbar">
            <select id="fulfillment-filter">
              <option value="all">全部</option>
              <option value="pending">未完成</option>
            </select>
          </div>
          <div id="fulfillment-list" class="card-list empty-tip">暂无收款发货记录。</div>
        </section>

        <section class="tab-panel" id="tab-stats">
          <div class="panel-toolbar two-cols">
            <label>
              开始日期
              <input id="stats-start" type="date" />
            </label>
            <label>
              结束日期
              <input id="stats-end" type="date" />
            </label>
          </div>
          <button id="run-stats" class="primary-btn full">查询统计</button>
          <div id="stats-table-wrap" class="stats-table-wrap"></div>
          <div class="summary-grid">
            <div class="summary-card">
              <span>总成本</span>
              <strong id="sum-cost">0.00</strong>
            </div>
            <div class="summary-card">
              <span>总收入</span>
              <strong id="sum-income">0.00</strong>
            </div>
            <div class="summary-card">
              <span>总利润</span>
              <strong id="sum-profit">0.00</strong>
            </div>
          </div>
        </section>

        <section class="tab-panel" id="tab-products">
          <h2>商品库</h2>
          <form id="product-search-form" class="inline-form">
            <input id="product-search" type="search" placeholder="搜索商品名称" />
            <button id="open-product-modal" type="button" class="primary-btn">新增商品</button>
          </form>
          <div id="product-list" class="card-list empty-tip">暂无商品。</div>
        </section>

        <section class="tab-panel" id="tab-customers">
          <h2>客户管理</h2>
          <form id="customer-form" class="inline-form">
            <input id="customer-name" type="text" placeholder="输入客户姓名" required />
            <button type="submit" class="primary-btn">新增客户</button>
          </form>
          <div id="customer-list" class="card-list empty-tip">暂无客户。</div>
        </section>

        <section class="tab-panel" id="tab-categories">
          <h2>分类管理</h2>
          <form id="category-form" class="inline-form">
            <input id="category-name" type="text" placeholder="输入分类名称" required />
            <button type="submit" class="primary-btn">新增分类</button>
          </form>
          <div id="category-list" class="card-list empty-tip">暂无分类。</div>
        </section>
      </main>
    </div>

    <dialog id="preorder-modal">
      <form method="dialog" class="modal-form" id="preorder-form">
        <input type="hidden" id="preorder-edit-id" value="" />
        <h3 id="preorder-modal-title">新增预购订单</h3>
        <label>
          分类
          <input id="preorder-category" type="text" list="category-suggestions" />
          <datalist id="category-suggestions"></datalist>
        </label>
        <label>
          客户
          <input id="preorder-customer" type="text" list="customer-suggestions" required />
          <datalist id="customer-suggestions"></datalist>
        </label>
        <label>
          商品
          <input id="preorder-product" type="text" list="product-suggestions" required />
          <datalist id="product-suggestions"></datalist>
        </label>
        <label>
          数量
          <input id="preorder-quantity" type="number" min="1" step="1" value="1" required />
        </label>
        <div class="two-cols">
          <label>
            商品进价
            <input id="preorder-cost-price" type="number" min="0" step="0.01" value="0" required />
          </label>
          <label>
            商品售价
            <input id="preorder-sale-price" type="number" min="0" step="0.01" value="0" required />
          </label>
        </div>
        <label>
          备注
          <textarea id="preorder-note" rows="3" placeholder="可选"></textarea>
        </label>
        <div class="row-actions">
          <button value="cancel" type="button" id="close-preorder-modal" class="ghost-btn">取消</button>
          <button type="submit" class="primary-btn">保存订单</button>
        </div>
      </form>
    </dialog>

    <dialog id="billing-modal">
      <form method="dialog" class="modal-form billing-modal-form" id="billing-form">
        <h3 id="billing-title">账单生成</h3>
        <div class="table-scroll">
          <table class="billing-table">
            <thead>
              <tr>
                <th>商品</th>
                <th>数量</th>
                <th>进价</th>
                <th>售价</th>
                <th>定金</th>
                <th>已付款</th>
              </tr>
            </thead>
            <tbody id="billing-rows"></tbody>
          </table>
        </div>
        <label>
          邮费
          <input id="billing-shipping-fee" type="number" min="0" step="0.01" value="0" />
        </label>
        <div class="summary-grid">
          <div class="summary-card">
            <span>总成本</span>
            <strong id="billing-total-cost">0.00</strong>
          </div>
          <div class="summary-card">
            <span>总售价</span>
            <strong id="billing-total-sale">0.00</strong>
          </div>
          <div class="summary-card">
            <span>总利润</span>
            <strong id="billing-total-profit">0.00</strong>
          </div>
        </div>
        <div id="billing-preview" class="billing-preview"></div>
        <div class="row-actions">
          <button type="button" id="close-billing-modal" class="ghost-btn">取消</button>
          <button type="button" id="generate-billing" class="ghost-btn">确认并生成账单</button>
          <button type="submit" class="primary-btn">保存账单数据</button>
        </div>
      </form>
    </dialog>

    <dialog id="product-modal">
      <form method="dialog" class="modal-form" id="product-form">
        <h3>商品录入</h3>
        <input type="hidden" id="product-id" />
        <label>商品名<input id="product-name" type="text" required /></label>
        <label>所属分类
          <select id="product-category"></select>
        </label>
        <label>库存<input id="product-stock" type="number" step="1" min="0" value="0" /></label>
        <label>进价<input id="product-cost" type="number" step="0.01" min="0" value="0" /></label>
        <label>售价<input id="product-sale" type="number" step="0.01" min="0" value="0" /></label>
        <div class="row-actions">
          <button type="button" id="close-product-modal" class="ghost-btn">取消</button>
          <button type="submit" class="primary-btn">保存商品</button>
          <button type="button" id="product-reset" class="ghost-btn">清空</button>
        </div>
      </form>
    </dialog>

    <dialog id="batch-modal">
      <form method="dialog" class="modal-form" id="batch-form">
        <h3 id="batch-title">新增批次</h3>
        <input id="batch-product-id" type="hidden" />
        <label>
          批次名称
          <input id="batch-name" type="text" placeholder="默认当天日期" />
        </label>
        <label>
          批次库存增量
          <input id="batch-stock-delta" type="number" step="1" value="1" />
        </label>
        <div class="two-cols">
          <label>
            批次进价
            <input id="batch-cost-price" type="number" min="0" step="0.01" value="0" />
          </label>
          <label>
            批次售价
            <input id="batch-sale-price" type="number" min="0" step="0.01" value="0" />
          </label>
        </div>
        <div class="row-actions">
          <button type="button" id="close-batch-modal" class="ghost-btn">取消</button>
          <button type="submit" class="primary-btn">保存批次</button>
        </div>
      </form>
    </dialog>

    <dialog id="report-modal" class="report-modal">
      <div class="report-page">
        <div class="report-header">
          <button id="close-report-modal" class="icon-btn" aria-label="关闭报告">×</button>
          <h3 id="report-title">账单报告</h3>
        </div>
        <div class="report-top">
          <div>
            <div class="report-label">账单总额（￥）</div>
            <div id="report-total-sale" class="report-number">0.00</div>
          </div>
          <div>
            <div class="report-label">总成本（￥）</div>
            <div id="report-total-cost" class="report-number">0.00</div>
          </div>
          <div>
            <div class="report-label">总利润（￥）</div>
            <div id="report-total-profit" class="report-number">0.00</div>
          </div>
        </div>
        <div class="table-scroll">
          <table class="billing-table report-table">
            <thead>
              <tr>
                <th>商品</th>
                <th>数量</th>
                <th>售价</th>
                <th>定金</th>
                <th>已付</th>
              </tr>
            </thead>
            <tbody id="report-rows"></tbody>
          </table>
        </div>
        <div class="report-actions">
          <button id="report-back-btn" class="ghost-btn">返回账单编辑</button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./db.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
